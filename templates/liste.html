<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes recettes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8b4513">
    <style>
        .avis-badge { font-size: 10px; padding: 1px 7px; border-radius: 99px;
                      background: #fdeee8; color: #c05a35; font-weight: 600;
                      margin-left: 6px; }
        .avis-badge:empty { display: none; }
    </style>
</head>
<body>
    <header>
        <h1>Mes recettes</h1>
        <input type="text" id="recherche" placeholder="Rechercher…" autocomplete="off">
        <div id="fav-controls"></div>
    </header>

    <ul id="liste-recettes">
        {% for r in recettes %}
            <li data-title="{{ r.titre }}" data-approuvee="{{ 'true' if r.approuvee else 'false' }}">
                <a href="{{ url_for('recette', recette_id=r.id) }}">{{ r.titre }}<span class="avis-badge" data-badge=""></span></a>
            </li>
        {% endfor %}
    </ul>

    <p class="compteur">{{ recettes|length }} recettes</p>

    <script>
        const champ = document.getElementById('recherche');
        const items = document.querySelectorAll('#liste-recettes li');

        function slugify(s) {
            return String(s).toLowerCase().normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9]+/g, "-")
                .replace(/^-+|-+$/g, "");
        }
        // Slug stable par recette (même calcul que Python _slug) — sert aux
        // favoris et au badge d'avis.
        items.forEach(li => { li.dataset.slug = slugify(li.dataset.title); });

        function filtrer() {
            const q = champ.value.toLowerCase().trim();
            const favSeul = window.Favoris && Favoris.seulement();
            let n = 0;
            items.forEach(li => {
                const okTexte = li.textContent.toLowerCase().includes(q);
                const okFav   = !favSeul || Favoris.estFavori(li.dataset.slug);
                const ok = okTexte && okFav;
                li.style.display = ok ? '' : 'none';
                if (ok) n++;
            });
            const c = document.querySelector('.compteur');
            if (c) c.textContent = n + ' recette' + (n > 1 ? 's' : '');
        }
        champ.addEventListener('input', filtrer);
        document.addEventListener('favoris:change', filtrer);

        // Enregistrement du service worker pour la PWA.
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }
    </script>

    <!-- ── Favoris ──────────────────────────────────────────────────────── -->
    <script src="{{ url_for('static', filename='favoris.js') }}"></script>
    <script>
        if (window.Favoris) Favoris.init();
        filtrer();
    </script>

    <!-- ── Avis (Supabase) : note moyenne par recette ────────────────────── -->
    <script src="{{ url_for('static', filename='avis.js') }}"></script>
    <script>
        // Le slug est déjà posé sur chaque <li> ; on le reporte sur le badge.
        document.querySelectorAll('#liste-recettes li').forEach(li => {
            const badge = li.querySelector('[data-badge]');
            if (badge) badge.dataset.badge = li.dataset.slug;
        });
        remplirBadgesAvis();
    </script>
</body>
</html>
