<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titre }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8b4513">
</head>
<body>
    <header class="header-recette">
        <a href="{{ url_for('liste') }}" class="bouton-retour">← Retour</a>
    </header>

    <article class="recette">
        {{ contenu_html|safe }}
    </article>

    <!-- ── Photos + Avis (Supabase) ─────────────────────────────────────── -->
    <section id="photos-zone"></section>
    <section id="avis-zone"></section>
    <script src="{{ url_for('static', filename='avis.js') }}"></script>
    <script src="{{ url_for('static', filename='photos.js') }}"></script>
    <script>
        // Le slug doit être identique à celui calculé par build.py (_slug),
        // afin que la prévisualisation locale et le site en ligne partagent
        // les mêmes avis et photos pour une recette donnée.
        function slugify(s) {
            return String(s).toLowerCase().normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9]+/g, "-")
                .replace(/^-+|-+$/g, "");
        }
        const _slug = slugify({{ titre|tojson }});
        initAvisRecette(_slug);
        initPhotosRecette(_slug);
    </script>
</body>
</html>
